services:
  - type: web
    name: skill-insight-api
    runtime: node
    plan: free
    region: singapore
    rootDir: skill-insight-backend 
    buildCommand: cd .. && npm install && npm run build --prefix skill-insight-backend
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: skill-insight-db
          property: connectionString

  - type: static
    name: skill-insight-ui
    runtime: static
    rootDir: skill-insight-frontend
    buildCommand: cd .. && npm install && npm run build --prefix skill-insight-frontend
    publishPath: ./dist/skill-insight-frontend/browser 
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: skill-insight-db
    plan: free
    region: singapore