<div id="wrapper">
    <div class="container">
        <form action="" id="form-login" method="POST">
            <h1>Sign in</h1>
            <div class="input-box">
                <label for="email">Email Address</label>
                <input type="text" id="email" name="email" placeholder="you@example.com" required>
                <i class='bx bx-envelope'></i>
            </div>
            <div class="input-box">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <i class='bx bx-lock-alt'></i>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox" name="remember">Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="btn" name="btn_login" value="login">Sign In</button>
            <div class="register-link">
                <p>Don't have an account? <a routerLink="/register">Create one</a></p>
            </div>
            <div class="divider">
                <div class="line-left"></div>
                <span>or</span>
                <div class="line-right"></div>
            </div>
            <div class="social-login">
                <button type="submit" class="gmail">
                    <img src="/google.png" alt="">
                </button>
                <button type="submit" class="mezon">
                    <img src="/mezon.png" alt="">
                </button>
            </div>
            <div class="notice">
                <p>By continuing, you agree to our <a href="#">Privacy Policy</a></p>
            </div>
        </form>
    </div>
</div>
