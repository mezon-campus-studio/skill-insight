<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="login.css" />
    <title>Sign In</title>
  </head>

  <body>
    <div class="container">
      <form action="" id="form-login" method="POST">
        <h1>Sign in</h1>
        <div class="input-box">
          <label for="email">Email Address</label>
          <input type="text" id="email" name="username" placeholder="you@example.com" required />
          <i class="bx bx-envelope"></i>
        </div>
        <div class="input-box">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
          <i class="bx bx-lock-alt"></i>
        </div>
        <div class="remember-forgot">
          <label><input type="checkbox" name="remember" />Remember me</label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn" name="btn_login" value="login">Sign In</button>
        <div class="register-link">
          <p>Don't have an account? <a href="register.html">Create one</a></p>
        </div>
        <div class="divider">
          <div class="line-left"></div>
          <span>or</span>
          <div class="line-right"></div>
        </div>
        <div class="social-login">
          <a href="" class="gmail">
            <!-- <i class='bx bxl-gmail'></i> -->
            <img src="../img/google.png" alt="" />
          </a>
          <a type="submit" class="mezon" (click)="login()">
            <img src="../img/mezon.png" alt="" />
          </a>
        </div>
        <div class="notice">
          <p>By continuing, you agree to our <a href="#">Privacy Policy</a></p>
        </div>
      </form>
    </div>
  </body>
</html>
